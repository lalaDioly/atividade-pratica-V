<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image/png" href="img/isotipo.png">
    <title>TWISTER Login</title>
</head>
<body>
    <header>
        
    </header>
    <main>
        <div class="login-container seu-card">
            <form action="feed.html" method="GET" class="form">
                <div class="img-logo"><img src="img/imagotipo.png" alt=""></div>
                <div>
                    <fieldset role="group" class="fieldset-login">
                        <input type="email" id="email" placeholder="E-mail" name="email_completo" required>
                        <input type="password" id="password" placeholder="Senha" name="password_completo" required>
                        <button class="btn" type="submit">Entrar</button>
                    </fieldset>
                </div>
            </form>
            <div class="index-links">
                <a href="cadastro.html" class="cadastro">Cadastrar</a>
                <a href="#" class="senha">Esqueci minha senha</a>
            </div>
        </div>
    </main>
</body>
</html>
